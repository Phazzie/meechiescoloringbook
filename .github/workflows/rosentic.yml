#
# Purpose: Runs Rosentic semantic conflict detection for pull requests.
# Why: Catch cross-branch conflicts before they reach main.
# Info flow: Pull request event -> checkout history -> Rosentic action -> PR comments/checks.
#
name: Rosentic Scan
on:
  pull_request:
    branches: [main]

concurrency:
  group: rosentic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rosentic:
    runs-on: ubuntu-latest
    name: Rosentic - Conflict Detection
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Rosentic/rosentic-action@v1
